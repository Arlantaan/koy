server {
    server_name koya.living www.koya.living;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Static frontend files
    root /var/www/koya/public;
    index index.html;

    # Uploaded menu images
    location ^~ /uploads/ {
        alias /var/www/koya/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Koya branding pics
    location ^~ /koya_pics/ {
        alias /root/koy-repo/public/koya_pics/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Menu item photos (served from repo)
    location ^~ /koya_menu_pics/ {
        alias /root/koy-repo/public/koya_menu_pics/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API proxy to FastAPI - MUST be before / location
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static asset caching
    location ~* \.(webp|jpg|jpeg|png|gif|css|js|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Serve static files directly, fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/koya.living/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/koya.living/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.koya.living) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = koya.living) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name koya.living www.koya.living;
    return 404; # managed by Certbot
}
