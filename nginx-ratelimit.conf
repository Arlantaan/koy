# Brute-force rate limiting zones — included in nginx http context via conf.d/
# Placed at /etc/nginx/conf.d/koya-ratelimit.conf by deploy.sh

# 10 requests/minute per IP for auth endpoints
limit_req_zone $binary_remote_addr zone=koya_auth:10m rate=10r/m;

# Friendly error page (JSON-compatible)
limit_req_status 429;
